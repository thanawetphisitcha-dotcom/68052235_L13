<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Tahoma',sans-serif;
}

body{
color:#3A2E2E;
}

/* Navbar */

.navbar{
background-color:#6B3E26;
color:white;
padding:15px 50px;
display:flex;
justify-content:space-between;
align-items:center;
}

.navbar .logo{
font-weight:bold;
font-size:20px;
}

.navbar nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:15px;
transition:0.3s;
}

.navbar nav a:hover{
color:#FFD6A5;
}

/* Hero Section */

.hero-section{
background-image:url("https://images.unsplash.com/photo-1509440159596-0249088772ff");
background-size:cover;
background-position:center;
height:380px;
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

.hero-overlay{
background:rgba(0,0,0,0.45);
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.hero-overlay h1{
color:white;
font-size:32px;
text-shadow:2px 2px 6px rgba(0,0,0,0.8);
}

/* Buttons */

.btn{
padding:10px 20px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
font-size:14px;
}

.btn-submit{
background-color:#C97B63;
}

.btn-submit:hover{
background-color:#B25E46;
}

.btn-reset{
background-color:#8B5E3C;
}

.btn-reset:hover{
background-color:#6B3E26;
}

/* Footer */

footer{
background-color:#6B3E26;
color:white;
text-align:center;
padding:15px 0;
font-size:14px;
margin-top:40px;
}

</style>

{% block title %}
{% endblock %}

</head>

<body>

<header class="navbar">
<div class="logo">Sweet Bakery</div>

<nav>
<a href="/">หน้าแรก</a>
<a href="/form">สั่งขนม</a>
<a href="/about">เกี่ยวกับร้าน</a>
</nav>
</header>

<section class="hero-section">
<div class="hero-overlay">
<h1>ยินดีต้อนรับสู่ร้าน Sweet Bakery</h1>
</div>
</section>

{% block content %}
{% endblock %}

<footer>
<p>© 2024 Sweet Bakery | Homemade Bakery</p>
</footer>

</body>
</html>
